name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.13.0'
      - run: zig build
      - run: zig build test
      - name: Install kcov
        run: |
          wget https://github.com/SimonKagstrom/kcov/releases/download/v42/kcov-amd64.tar.gz
          tar xzf kcov-amd64.tar.gz
          mv usr/local/bin/kcov /usr/local/bin/kcov
      - name: Build coverage binaries
        run: zig build coverage
      - name: Run kcov
        run: |
          mkdir -p coverage-out
          for bin in zig-out/coverage/test_*; do
            kcov --include-path=$(pwd)/src coverage-out "$bin"
          done
          find coverage-out -type f | head -20
      - uses: codecov/codecov-action@v4
        with:
          files: coverage-out/*/coverage.lcov,coverage-out/coverage.lcov,coverage-out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false